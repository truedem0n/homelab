# /usr/bin/ansible-pull -U https://github.com/truedem0n/homelab.git prod/ansible/playbooks/wireguard.yml
---
- name: setup wireguard
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  vars:
    interface_name: wg0
    wireguard_address: "10.8.0.1/24"
    listen_port: 51820
    external_interface: ens5

  tasks:
    - name: Install packages
      apt:
        name:
          - wireguard
          - wireguard-tools
          - iptables-persistent
          - qrencode
        state: present
        update_cache: yes

    - name: Create WireGuard config and clients directories
      file:
        path: "{{ item }}"
        state: directory
        mode: "0700"
      loop:
        - /etc/wireguard
        - /etc/wireguard/clients

    - name: Deploy python script
      template:
        src: add_peer.py.j2
        dest: "/etc/wireguard/add_peer.py"
        mode: "0755"

    - name: Check if server private key exists
      stat:
        path: /etc/wireguard/privatekey
      register: server_priv_key_file

    - name: Generate server private key if not exists
      command: wg genkey
      register: new_server_priv_key
      when: not server_priv_key_file.stat.exists

    - name: Save server private key if new
      copy:
        content: "{{ new_server_priv_key.stdout }}"
        dest: /etc/wireguard/privatekey
        mode: "0600"
      when: not server_priv_key_file.stat.exists

    - name: Load server private key
      slurp:
        src: /etc/wireguard/privatekey
      register: server_private_key_base64

    - name: Generate server public key if not exists
      shell: echo "{{ server_private_key_base64.content | b64decode | trim }}" | wg pubkey
      register: new_server_pub_key
      changed_when: false

    - name: Save server public key
      copy:
        content: "{{ new_server_pub_key.stdout }}"
        dest: /etc/wireguard/publickey
        mode: "0600"

    - name: Create wg0.conf if it does not exist
      copy:
        dest: "/etc/wireguard/{{ interface_name }}.conf"
        mode: "0600"
        force: no
        content: |
          [Interface]
          Address = {{ wireguard_address }}
          ListenPort = {{ listen_port }}
          PrivateKey = {{ server_private_key_base64.content | b64decode | trim }}
          PostUp = iptables -A FORWARD -i %i -j ACCEPT; iptables -A FORWARD -o %i -j ACCEPT; iptables -t nat -A POSTROUTING -o {{ external_interface }} -j MASQUERADE
          PostDown = iptables -D FORWARD -i %i -j ACCEPT; iptables -D FORWARD -o %i -j ACCEPT; iptables -t nat -D POSTROUTING -o {{ external_interface }} -j MASQUERADE

    - name: Check if client config exists
      stat:
        path: "/etc/wireguard/clients/{{ item.name }}_{{ item.expected_suffix }}.conf"
      loop:
        - { name: ha_rpi, type: split, expected_suffix: split }
        - { name: ipad, type: split, expected_suffix: split }
        - { name: mac_air_an, type: both, expected_suffix: split }
        - { name: mac_air_at, type: both, expected_suffix: split }
        - { name: nuc, type: both, expected_suffix: split }
        - { name: pc, type: both, expected_suffix: split }
        - { name: pixel7pro, type: full, expected_suffix: full }
        - { name: pixel8pro, type: full, expected_suffix: full }
        - { name: ser, type: both, expected_suffix: split }
        - { name: serw, type: split, expected_suffix: split }
      register: client_stats

    - name: Create client peers using add_peer.py
      command: "/etc/wireguard/add_peer.py --name {{ item.item.name }} --config {{ item.item.type }}"
      args:
        chdir: /etc/wireguard
      loop: "{{ client_stats.results }}"
      when: not item.stat.exists

    - name: Enable IP forwarding
      sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        state: present
        reload: yes

    - name: Start and enable WireGuard service
      systemd:
        name: "wg-quick@{{ interface_name }}"
        enabled: yes
        state: started

    - name: Save iptables rules
      command: netfilter-persistent save
