# Setup & Run: sudo apt update && sudo apt upgrade -y && sudo apt install -y git ansible && sudo ansible-pull -U https://github.com/truedem0n/homelab.git prod/ansible/playbooks/vps.yml
---
- import_playbook: ../distros/ubuntu/base.yml
- import_playbook: docker.yml

- name: Install WireGuard via APT
  hosts: localhost
  connection: local
  become: true
  tasks:
    - name: Install WireGuard and tools
      apt:
        name:
          - wireguard
          - wireguard-tools
        state: present
        update_cache: yes

    - name: Check if wg0.conf exists
      stat:
        path: /etc/wireguard/wg0.conf
      register: wg0_conf

    - name: Start and enable WireGuard service
      systemd:
        name: wg-quick@wg0
        enabled: yes
        state: started
      when: wg0_conf.stat.exists



