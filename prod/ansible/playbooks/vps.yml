# Setup & Run: sudo apt update && sudo apt upgrade -y && sudo apt install -y git ansible && sudo ansible-pull -U https://github.com/truedem0n/homelab.git prod/ansible/playbooks/vps.yml
---
- import_playbook: ../distros/ubuntu/base.yml
  vars:
    running_via_vps: true
- import_playbook: docker.yml
  vars:
    running_via_vps: true

- name: Install and Configure WireGuard
  hosts: localhost
  connection: local
  become: true
  tasks:
    - name: Install WireGuard and tools
      apt:
        name:
          - wireguard
          - wireguard-tools
        state: present
        update_cache: yes

    - name: Check if wg0.conf exists
      stat:
        path: /etc/wireguard/wg0.conf
      register: wg0_conf

    - name: Fix interface mismatch in existing wg0.conf
      replace:
        path: /etc/wireguard/wg0.conf
        regexp: '-o \S+ -j MASQUERADE'
        replace: '-o {{ ansible_default_ipv4.interface | default("eth0") }} -j MASQUERADE'
      when: wg0_conf.stat.exists
      notify: restart wireguard

    - name: Enable IP forwarding
      sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        state: present
        reload: yes

    - name: Start and enable WireGuard service
      systemd:
        name: wg-quick@wg0
        enabled: yes
        state: started
      when: wg0_conf.stat.exists

    - name: Check if docker stack directories exist
      stat:
        path: "/opt/stacks/{{ item }}"
      loop:
        - caddy
        - backrest
        - homepage
        - termix
        - uptime-kuma
        - vaultwarden
        - filebrowser_quantum
        - wud
        - dockge
      register: stack_dirs

    - name: Start docker compose stacks if they exist
      command: docker compose up -d
      args:
        chdir: "/opt/stacks/{{ item.item }}"
      loop: "{{ stack_dirs.results }}"
      when: item.stat.exists

    - name: Install UFW
      apt:
        name: ufw
        state: present

    - name: Allow SSH in UFW
      ufw:
        rule: allow
        port: '22'
        proto: tcp

    - name: Allow WireGuard in UFW
      ufw:
        rule: allow
        port: '51820'
        proto: udp

    - name: Allow all traffic from WireGuard subnet in UFW
      ufw:
        rule: allow
        from_ip: '10.8.0.0/24'

    - name: Allow all traffic from Docker subnet in UFW
      ufw:
        rule: allow
        from_ip: '172.16.0.0/12'

    - name: Configure UFW default forward policy to ACCEPT
      lineinfile:
        path: /etc/default/ufw
        regexp: '^DEFAULT_FORWARD_POLICY='
        line: 'DEFAULT_FORWARD_POLICY="ACCEPT"'
      notify: reload ufw

    - name: Enable UFW
      ufw:
        state: enabled

  handlers:
    - name: restart wireguard
      systemd:
        name: wg-quick@wg0
        state: restarted

    - name: reload ufw
      ufw:
        state: reloaded



