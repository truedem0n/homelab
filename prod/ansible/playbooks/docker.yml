# /usr/bin/ansible-pull -U https://github.com/truedem0n/homelab.git prod/ansible/playbooks/docker.yml
---
- name: Install Docker using official convenience script
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  tasks:
    - name: Check if docker is installed
      command: which docker
      register: docker_check
      failed_when: false
      changed_when: false
      when: running_via_vps | default(false)

    - name: End play if docker is already present and running via VPS playbook
      meta: end_play
      when:
        - running_via_vps | default(false)
        - docker_check.rc is defined and docker_check.rc == 0

    - name: Get list of existing users
      getent:
        database: passwd

    - name: Install required packages
      apt:
        name:
          - curl
        state: present
        update_cache: true

    - name: Check if Docker is installed
      stat:
        path: /usr/bin/docker
      register: docker_installed

    - name: Download and run Docker install script
      shell: curl -fsSL https://get.docker.com | sh
      args:
        executable: /bin/bash
      when: not docker_installed.stat.exists

    - name: Create docker group (if it doesn't exist)
      group:
        name: docker
        state: present

    - name: Add users to docker group
      user:
        name: "{{ item }}"
        groups: docker
        append: yes
      loop:
        - skylord
        - ubuntu
        - "{{ ansible_env.SUDO_USER | default('') }}"
      when:
        - item != ''
        - item != 'root'
        - item in getent_passwd

    - name: Enable and start Docker service
      systemd:
        name: docker
        enabled: true
        state: started

    - name: Warn user to re-login for Docker group to apply
      debug:
        msg: |
          ✅ Docker installed and configured.
          🔁 Please **log out and log back in** (or reboot)
          so that changes to the 'docker' group take effect.
