# /usr/bin/ansible-pull -U https://github.com/truedem0n/homelab.git prod/ansible/distros/ubuntu/base.yml
---
- name: Update and upgrade Ubuntu packages locally
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  vars:
    git_repo_url: "https://github.com/truedem0n/homelab.git"
    ansible_playbook_path: "prod/ansible/distros/ubuntu/base.yml"
    ansible_flag_path: "/ansible/ansible_first_run.flag"
    ansible_user: "skylord"

  tasks:
    - name: Check if cron is installed
      command: which cron
      register: cron_check
      failed_when: false
      changed_when: false
      when: running_via_vps | default(false)

    - name: End play if cron is already present and running via VPS playbook
      meta: end_play
      when:
        - running_via_vps | default(false)
        - cron_check.rc is defined and cron_check.rc == 0

    - name: Update package cache
      apt:
        update_cache: yes

    - name: Upgrade all packages
      apt:
        upgrade: dist

    - name: Check if the flag file exists
      stat:
        path: "{{ ansible_flag_path }}"
      register: flag_file

    - name: Create required directories
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
        recurse: yes
      loop:
        - /ansible/
        - /mnt/data
      when: flag_file.stat.exists == false

    - name: Create the flag file if it does not exist
      file:
        path: "{{ ansible_flag_path }}"
        state: touch
      when: flag_file.stat.exists == false

    - name: Install packages (ubuntu)
      apt:
        name:
          - ca-certificates
          - curl
          - vim
          - htop
          - screen
          - neovim
          - cron
        state: present

    - name: Add user to sudo group
      user:
        name: "{{ ansible_user }}"
        groups: sudo
        append: yes

    - name: Configure NOPASSWD sudo access
      lineinfile:
        path: /etc/sudoers.d/ansible-user
        state: present
        create: yes
        mode: "0440"
        line: "{{ ansible_user }} ALL=(ALL) NOPASSWD: ALL"
        validate: "visudo -cf %s"

    - name: Schedule playbook to run every 5 minutes with logging
      cron:
        name: "Run Ansible playbook every 5 minutes with logging"
        job: "/usr/bin/ansible-pull -v -U {{ git_repo_url }} {{ ansible_playbook_path }} > /var/log/ansible-pull.log 2>&1"
        special_time: "daily"
        state: present

    - name: Schedule playbook to run at reboot with logging
      cron:
        name: "Run Ansible playbook at reboot with logging"
        job: "/usr/bin/ansible-pull -U {{ git_repo_url }} {{ ansible_playbook_path }} > /var/log/ansible-pull.log 2>&1"
        special_time: "reboot"
        state: present

    - name: Set default editor in .bashrc
      blockinfile:
        path: ~/.bashrc
        block: |
          export EDITOR='nvim'
          export VISUAL='nvim'
        marker: "# {mark} ANSIBLE MANAGED BLOCK EDITOR"

    - name: Schedule docker system prune all
      cron:
        name: "Run docker system prune with logging"
        job: "/usr/bin/docker system prune -af > /var/log/docker-prune.log 2>&1"
        special_time: "daily"
        state: present

    - name: Create SSH directory for skylord
      file:
        path: "/home/{{ ansible_user }}/.ssh"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0700"

    - name: Check if skylord already has authorized_keys
      stat:
        path: "/home/{{ ansible_user }}/.ssh/authorized_keys"
      register: skylord_keys

    - name: Generate SSH key pair for skylord
      command: ssh-keygen -t ed25519 -N "" -f /tmp/skylord_key
      when: not skylord_keys.stat.exists or skylord_keys.stat.size == 0

    - name: Copy generated public key to skylord authorized_keys
      copy:
        src: /tmp/skylord_key.pub
        dest: "/home/{{ ansible_user }}/.ssh/authorized_keys"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"
        remote_src: yes
      when: not skylord_keys.stat.exists or skylord_keys.stat.size == 0

    - name: Read generated private key
      slurp:
        src: /tmp/skylord_key
      register: skylord_private_key_b64
      when: not skylord_keys.stat.exists or skylord_keys.stat.size == 0

    - name: Copy private key to home directory
      copy:
        src: /tmp/skylord_key
        dest: "/home/{{ ansible_user }}/skylord_key.pem"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0400"
        remote_src: yes
      when: not skylord_keys.stat.exists or skylord_keys.stat.size == 0

    - name: Display generated private key (COPY THIS KEY!)
      debug:
        msg: |
          ========================================================================
          🔑 NEW SSH PRIVATE KEY GENERATED FOR USER: {{ ansible_user }}
          ========================================================================
          Please copy the entire private key block below and save it locally
          as 'skylord_key.pem'.

          {{ skylord_private_key_b64.content | b64decode }}

          ========================================================================
          Run: chmod 400 skylord_key.pem
          Connect: ssh -i skylord_key.pem {{ ansible_user }}@<your_server_ip>
          ========================================================================
      when: not skylord_keys.stat.exists or skylord_keys.stat.size == 0

    - name: Clean up temporary key files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/skylord_key
        - /tmp/skylord_key.pub
      when: not skylord_keys.stat.exists or skylord_keys.stat.size == 0

    # 🚫 SSH Hardening
    - name: Backup current sshd_config
      copy:
        src: /etc/ssh/sshd_config
        dest: /etc/ssh/sshd_config.bak
        remote_src: yes

    - name: Disable root login in SSH
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PermitRootLogin"
        line: "PermitRootLogin yes"
        state: present
        backrefs: yes

    - name: Disable password authentication in SSH
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication yes"
        state: present
        backrefs: yes

    - name: Restart SSH to apply config changes
      service:
        name: ssh
        state: restarted
